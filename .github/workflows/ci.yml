name: CI

on:
  pull_request:
  push:
    branches:
      - main
jobs:
  test:
    name: "PHPUnit: MW ${{ matrix.mw }}, PHP ${{ matrix.php }}"
    strategy:
      fail-fast: false
      matrix:
        include:
          - mw: "REL1_39"
            php: 7.4
          - mw: "REL1_39"
            php: 8.0
          - mw: "REL1_39"
            php: 8.1
    runs-on: ubuntu-latest
    steps:
      # check out the repository!
      - name: Checkout
        uses: actions/checkout@v3
      - name: Test extension
        uses: wikiteq/mediawiki-phpunit-action@master
        with:
          type: extension
          php: ${{ matrix.php }}
          mwbranch: ${{ matrix.mw }}
          extension: SummaryToJiraComment
